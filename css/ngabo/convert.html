<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .converter-box {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    .swap-btn {
      background: #444;
      color: white;
    }

    .convert-btn {
      background: #28a745;
      color: white;
    }

    .loading {
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <button onclick="showHome()">Home</button>
    <button onclick="showconverter()">converter</button>
    <button onclick="showhistory()">history</button>
     <button onclick="showsettings()">settings</button>
    
</nav>

<!-- CONVERTER -->
<div class="converter-box">
  <h2>Currency Converter</h2>

  <input type="number" id="amount" placeholder="Enter amount">

  <label>From:</label>
  <select id="from">
    <option value="USD">🇺🇸 USD</option>
    <option value="EUR">🇪🇺 EUR</option>
    <option value="GBP">🇬🇧 GBP</option>
    <option value="RWF">🇷🇼 RWF</option>
  </select>

  <button class="swap-btn" onclick="swapCurrencies()">⇄ Swap</button>

  <label>To:</label>
  <select id="to">
    <option value="RWF">🇷🇼 RWF</option>
    <option value="USD">🇺🇸 USD</option>
    <option value="EUR">🇪🇺 EUR</option>
    <option value="GBP">🇬🇧 GBP</option>
  </select>

  <button class="convert-btn" onclick="convert()">Convert</button>

  <!-- Loading Spinner -->
  <div class="loading" id="loading">⏳ Converting...</div>

  <h3 id="result"></h3>
</div>

<script>
/* =============================
   EXCHANGE RATES (STATIC)
============================= */
const rates = {
  USD: 1,
  EUR: 0.92,
  GBP: 0.78,
  RWF: 1300
};

/* =============================
   CONVERT FUNCTION
============================= */
function convert() {
  const amount = document.getElementById("amount").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const resultText = document.getElementById("result");
  const loader = document.getElementById("loading");

  // Validation
  if (!amount || amount <= 0) {
    alert("Please enter a valid positive amount");
    return;
  }

  // Show loading
  loader.style.display = "block";
  resultText.innerText = "";

  // Simulate delay (like API call)
  setTimeout(() => {
    const result = (amount / rates[from]) * rates[to];

    resultText.innerText =
      `${amount} ${from} = ${result.toFixed(2)} ${to}`;

    loader.style.display = "none";

    saveHistory(`${amount} ${from} → ${result.toFixed(2)} ${to}`);
  }, 800);
}

/* =============================
   SWAP FUNCTION
============================= */
function swapCurrencies() {
  const from = document.getElementById("from");
  const to = document.getElementById("to");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;
}

/* =============================
   SAVE HISTORY
============================= */
function saveHistory(entry) {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(entry);
  localStorage.setItem("history", JSON.stringify(history));
}

/* =============================
   LOAD THEME
============================= */
function loadTheme() {
  let theme = localStorage.getItem("theme");
  if (theme === "dark") {
    document.body.classList.add("dark");
  }
}

loadTheme();
</script>

</body>
</html>
