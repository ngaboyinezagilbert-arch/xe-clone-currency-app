
<!DOCTYPE html>
<html>
<head>
    <title>Simple NGABO Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #127417;
        }
        #gameCanvas {
            background: blue;
            display: block;
            margin: 0 auto;
            border: 1px solid #8d1f72;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let car = {
    x: canvas.width/2 - 21,
    y: canvas.height - 10,
    width: 5,
    height: 10,
    speed: 8
};

let keys = {};
let obstacles = [];
let score = 0;

// Listen to keyboard
document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

// Generate obstacles
function createObstacle() {
    let width = Math.random() * 100 + 50;
    let x = Math.random() * (canvas.width - width);
    obstacles.push({x: x, y: -100, width: width, height: 20, speed: 4});
}

// Update game
function update() {
    // Move car
    if(keys["ArrowLeft"] && car.x > 0) car.x -= car.speed;
    if(keys["ArrowRight"] && car.x + car.width < canvas.width) car.x += car.speed;

    // Move obstacles
    for(let i = 0; i < obstacles.length; i++){
        obstacles[i].y += obstacles[i].speed;

        // Check collision
        if(car.x < obstacles[i].x + obstacles[i].width &&
           car.x + car.width > obstacles[i].x &&
           car.y < obstacles[i].y + obstacles[i].height &&
           car.y + car.height > obstacles[i].y){
            alert("Game Over! Score: " + score);
            document.location.reload();
        }

        // Remove obstacle if off-screen
        if(obstacles[i].y > canvas.height){
            obstacles.splice(i, 1);
            score++;
            i--;
        }
    }

    // Occasionally add new obstacle
    if(Math.random() < 0.02) createObstacle();
}

// Draw game
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw road
    ctx.fillStyle = "#555";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw car
    ctx.fillStyle = "red";
    ctx.fillRect(car.x, car.y, car.width, car.height);

    // Draw obstacles
    ctx.fillStyle = "black";
    for(let obs of obstacles){
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    }

    // Draw score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 10, 30);
}

// Game loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
