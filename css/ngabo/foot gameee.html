<!DOCTYPE html>
<html>
<head>
    <title>Football Game 11 vs 11</title>
    <style>
        canvas {
            background: green;
            display: block;
            margin: auto;
            border: 2px solid black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Ball
let ball = { x: 400, y: 250, radius: 10, color: "white", dx: 2, dy: 2 };

// Players
let team1 = [];
let team2 = [];
const playerWidth = 20;
const playerHeight = 20;

// Create team1 (blue)
for(let i=0; i<11; i++){
    team1.push({ 
        x: 50 + i*50, 
        y: 50 + (i%5)*80, 
        width: playerWidth, 
        height: playerHeight, 
        color: "blue", 
        speed: 5 
    });
}

// Create team2 (red)
for(let i=0; i<11; i++){
    team2.push({ 
        x: 650 - i*50, 
        y: 50 + (i%5)*80, 
        width: playerWidth, 
        height: playerHeight, 
        color: "red", 
        speed: 5 
    });
}

// Goal
let goal1 = { x: 0, y: 200, width: 30, height: 100, color: "yellow" };

// Keyboard input for player 1
let keys = {};
document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

function update() {
    // Move first player in team1 (controlled by arrows)
    let player = team1[0];
    if(keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
    if(keys["ArrowDown"] && player.y + player.height < canvas.height) player.y += player.speed;
    if(keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if(keys["ArrowRight"] && player.x + player.width < canvas.width) player.x += player.speed;

    // Ball movement
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Bounce off top & bottom walls
    if(ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) ball.dy *= -1;

    // Bounce off side walls (excluding goals)
    if(ball.x - ball.radius < goal1.width && !(ball.y > goal1.y && ball.y < goal1.y + goal1.height)) ball.dx *= -1;
