<!DOCTYPE html>
<html>
<head>
  <title>Star and Ellipse</title>
  <style>
    /* General page styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff; /* light blue background */
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* Header styles */
    header {
      background-color: #0077b6; /* deep blue */
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    footer {
      background-color: #023e8a;
      color: white;
      padding: 15px;
      font-size: 18px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }

    /* Star animation */
    .star polygon {
      transition: transform 0.3s, fill 0.3s;
    }
    .star polygon:hover {
      transform: scale(1.2) rotate(15deg);
      fill: orange;
      cursor: pointer;
    }

    /* Ellipse styling */
    .ellipse text {
      font-family: 'Verdana', sans-serif;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>Welcome to Mubuga TSS</header>

  <!-- Star SVG -->
  <svg class="star" height="100" width="100">
    <polygon points="50,5 61,38 95,38 67,59 78,92 50,72 22,92 33,59 5,38 39,38"
             fill="gold"
             stroke="black"
             stroke-width="2"
             fill-rule="evenodd">
    </polygon>
  </svg>
  <br><br>

  <!-- Ellipse with gradient -->
  <svg class="ellipse" height="100" width="200">
    <defs>
      <linearGradient id="grd1" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="blue" />
        <stop offset="100%" stop-color="white" />
      </linearGradient>
    </defs>
    <ellipse cx="100" cy="50" rx="80" ry="40" fill="url(#grd1)" />
    <text x="100" y="50" fill="black" font-size="20" text-anchor="middle" dominant-baseline="middle">
      Ngabo
    </text>
  </svg>

  <footer>
    Welcome to Mubuga TSS
  </footer>
</body>
</html>
